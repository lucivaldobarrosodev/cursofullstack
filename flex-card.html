<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex Card</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        background: #eee;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .card {
        display: flex;
        background: white;
        border: 1px solid #ccc;
        width: 380px;
        height: 200px;
      }
      .foto {
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f0f0f0;
        flex-basis: 200px;
      }
      .foto i {
        font-size: 50px;
        color: #888;
      }

      .info {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .info h1 {
        font-size: 24px;
        color: #333;
      }

      .info h2 {
        font-size: 18px;
        text-transform: uppercase;
        color: #e49800;
      }

      .info p {
        font-size: 14px;
        color: #555;
        text-align: justify;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="foto">
        <i class="fas fa-user"></i>
      </div>
      <div class="info">
        <h2>Desenvolvedor</h2>
        <h1>Meu nome</h1>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas,
          doloremque.
        </p>
      </div>
    </div>
  </body>
</html>
