<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linktree | Thiago Cidade</title>

    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
  </head>
  <body>
    <div class="content">
      <header>
        <img
          src="https://github.com/nome-usuario.png"
          alt="Avatar de Usuário"
        />
        <h1>Meu Nome</h1>
        <p>
          Minha descrção básica
        </p>
      </header>
      <div class="content_main">
        <ul>
          <li><a href="#" class="link-github"><i class="fa-brands fa-github"></i></a></li>
          <li><a href="#" class="link-linkedin"><i class="fa-brands fa-linkedin"></i></a></li>
          <li><a href="#" class="link-instagram"><i class="fa-brands fa-instagram"></i></a></li>
          <li><a href="#" class="link-twitter"><i class="fa-brands fa-twitter"></i></a></li>
          <li><a href="#" class="link-youtube"><i class="fa-brands fa-youtube"></i></a></li>
        </ul>
        <main>
          <a href="#">
            <i class="fa-solid fa-house"></i>
            <p>Ver Web Site</p>
            <i class="fa-solid fa-angle-right"></i>
          </a>
          <a href="#">
            <i class="fa-solid fa-briefcase"></i>
            <p>Portfolio</p>
            <i class="fa-solid fa-angle-right"></i>
          </a>
          <a href="#">
            <i class="fa-solid fa-user"></i>
            <p>Sobre</p>
            <i class="fa-solid fa-angle-right"></i>
          </a>
          <a href="tel:+559599999999">
            <i class="fa-solid fa-phone"></i>
            <p>Contato</p>
            <i class="fa-solid fa-angle-right"></i>
          </a>
        </main>
        <footer onclick="location.href='mailto:email@exemple.com'">
          <i class="fa-regular fa-envelope"></i>
          <span>
            <h2>Junte-se a minha comunidade.</h2>
            <p>Fique por dentro das novidades cadastrando-se no newsletter.</p>
          </span>
        </footer>
      </div>
    </div>
  </body>
</html>
